<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON://TERMINAL v0.8.4 — GRID ACCESS GRANTED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --neon-cyan: #00f7ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff41;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0a;
            color: var(--neon-cyan);
            font-family: 'VT323', monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* MATRIX RAIN */
        #matrix-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.25;
            pointer-events: none;
        }

        /* TERMINAL LOOK */
        .crt {
            background: #111;
            border: 14px solid #222;
            border-radius: 12px;
            box-shadow: 0 0 60px var(--neon-cyan),
                        inset 0 0 80px rgba(0,247,255,0.4),
                        0 0 0 10px #000;
            position: relative;
            overflow: hidden;
        }
        .crt::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px, transparent 4px, rgba(0,247,255,0.18) 4px, rgba(0,247,255,0.18) 8px);
            animation: scanline 3s linear infinite;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes scanline { 0% { background-position: 0 0; } 100% { background-position: 0 200%; } }

        .terminal-header {
            background: #111;
            border-bottom: 6px solid var(--neon-pink);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0 30px var(--neon-pink);
        }

        /* SLIDER */
        .slide-container {
            height: 560px;
            position: relative;
            overflow: hidden;
        }
        .slides-wrapper {
            display: flex;
            height: 100%;
            transition: transform 800ms cubic-bezier(0.23, 1, 0.32, 1);
        }
        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.3) brightness(1.15);
        }
        .slide-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,10,10,0.9), transparent 40%);
            display: flex;
            align-items: flex-end;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .slide:hover .slide-overlay { opacity: 1; }

        /* CONTROLS */
        .control-btn {
            background: rgba(0,0,0,0.85);
            border: 4px solid var(--neon-cyan);
            color: var(--neon-cyan);
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            box-shadow: 0 0 30px var(--neon-cyan);
            transition: all 0.2s;
        }
        .control-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 50px var(--neon-pink);
        }

        .neon-text {
            text-shadow: 0 0 10px var(--neon-cyan),
                         0 0 20px var(--neon-cyan),
                         0 0 40px var(--neon-pink);
        }

        /* CARTRIDGES */
        .cartridge {
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .cartridge:hover {
            transform: translateY(-20px) rotate(3deg) scale(1.08);
            filter: drop-shadow(0 0 40px var(--neon-green));
        }
    </style>
</head>
<body>

    <!-- MATRIX RAIN -->
    <canvas id="matrix-bg"></canvas>

    <div class="max-w-7xl mx-auto px-6 pt-8">
        
        <!-- TERMINAL BAR -->
        <div class="terminal-header rounded-t-3xl">
            <div class="flex items-center gap-3">
                <div class="w-4 h-4 bg-red-500 rounded-full animate-pulse"></div>
                <div class="w-4 h-4 bg-yellow-500 rounded-full"></div>
                <div class="w-4 h-4 bg-emerald-400 rounded-full"></div>
                <span class="text-3xl tracking-widest ml-4">NEON://TERMINAL v0.8.4</span>
            </div>
            <div id="live-log" class="text-emerald-400 text-xl tracking-[4px]"></div>
        </div>

        <!-- HERO SLIDER -->
        <div class="crt">
            <div id="slider" class="slide-container">
                <div id="slides-wrapper" class="slides-wrapper"></div>

                <!-- Controls -->
                <div class="absolute bottom-8 left-8 right-8 flex justify-between items-center z-30 px-8">
                    <button onclick="prevSlide()" class="control-btn text-5xl">◀</button>
                    
                    <button onclick="togglePlay()" id="play-pause-btn" class="control-btn text-6xl w-20 h-20">
                        <span id="play-icon">▶</span>
                        <span id="pause-icon" class="hidden">❚❚</span>
                    </button>
                    
                    <button onclick="nextSlide()" class="control-btn text-5xl">▶</button>
                </div>

                <!-- Progress bar -->
                <div class="absolute bottom-0 left-0 right-0 h-2 bg-black/60">
                    <div id="progress-bar" class="h-full w-0 bg-gradient-to-r from-cyan-400 via-pink-500 to-emerald-400 transition-all"></div>
                </div>

                <!-- Dots -->
                <div id="slide-dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-3 z-30"></div>
            </div>
        </div>

        <!-- CARTRIDGES -->
        <div class="mt-20">
            <div class="flex justify-center mb-10">
                <div class="inline-flex items-center gap-6 bg-black border-4 border-emerald-400 px-12 py-4 rounded-3xl text-4xl tracking-widest neon-text">
                    📼 INSERT CARTRIDGE TO BOOT PROJECT 📼
                </div>
            </div>
            
            <div id="cartridges-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="fixed bottom-0 left-0 right-0 bg-black border-t-4 border-pink-500 text-center py-3 text-xs tracking-[3px] text-pink-400 font-mono z-50">
        SYSTEM STATUS: ONLINE • 10s SLIDE CYCLE ACTIVE • PRESS SPACE TO PAUSE • YOU ARE IN THE GRID
    </div>

    <script>
        // === MATRIX RAIN ===
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const chars = "01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@%&*".split("");
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10,10,10,0.07)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f7ff';
            ctx.font = `${fontSize}px VT323`;
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // === SLIDER DATA (REPLACE THESE WITH YOUR IMAGES) ===
        const slidesData = [
            { img: "https://via.placeholder.com/1920x1080/111111/00f7ff?text=SLIDE+1+-+YOUR+IMAGE+HERE", link: "https://your-link-1.com", title: "NEON RUNNER" },
            { img: "https://via.placeholder.com/1920x1080/111111/ff00ff?text=SLIDE+2+-+YOUR+IMAGE+HERE", link: "https://your-link-2.com", title: "GLITCH PROTOCOL" },
            { img: "https://via.placeholder.com/1920x1080/111111/00ff41?text=SLIDE+3+-+YOUR+IMAGE+HERE", link: "https://your-link-3.com", title: "VOID ARCHIVE" },
            { img: "https://via.placeholder.com/1920x1080/111111/ffff00?text=SLIDE+4+-+YOUR+IMAGE+HERE", link: "https://your-link-4.com", title: "HYPERDRIVE" }
        ];

        const cartridgesData = [
            { title: "NEON RUNNER", subtitle: "8-BIT EDITION", link: "https://your-link-1.com" },
            { title: "GLITCH PROTOCOL", subtitle: "ERROR 404 RELOADED", link: "https://your-link-2.com" },
            { title: "VOID ARCHIVE", subtitle: "DATA CORRUPTED 1999", link: "https://your-link-3.com" },
            { title: "HYPERDRIVE", subtitle: "WARP SPEED ENGAGED", link: "https://your-link-4.com" }
        ];

        // === SLIDER LOGIC ===
        let currentSlide = 0;
        let isPlaying = true;
        let slideInterval;

        const wrapper = document.getElementById('slides-wrapper');
        const progressBar = document.getElementById('progress-bar');
        const dotsContainer = document.getElementById('slide-dots');

        function createSlides() {
            wrapper.innerHTML = '';
            slidesData.forEach((slide) => {
                const div = document.createElement('div');
                div.className = 'slide';
                div.innerHTML = `
                    <a href="${slide.link}" target="_blank" class="block w-full h-full relative group">
                        <img src="${slide.img}" alt="${slide.title}">
                        <div class="slide-overlay">
                            <div class="neon-text">
                                <h2 class="text-6xl">${slide.title}</h2>
                                <p class="text-3xl text-pink-400">10s TRANSMISSION CYCLE</p>
                            </div>
                        </div>
                    </a>
                `;
                wrapper.appendChild(div);
            });
            createDots();
        }

        function createDots() {
            dotsContainer.innerHTML = '';
            slidesData.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `w-4 h-4 rounded-full border-2 border-cyan-400 cursor-pointer ${i === 0 ? 'bg-cyan-400 scale-125' : ''}`;
                dot.onclick = () => showSlide(i);
                dotsContainer.appendChild(dot);
            });
        }

        function showSlide(index) {
            currentSlide = (index + slidesData.length) % slidesData.length;
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
            resetProgressBar();
        }

        function updateDots() {
            document.querySelectorAll('#slide-dots > div').forEach((dot, i) => {
                dot.classList.toggle('bg-cyan-400', i === currentSlide);
                dot.classList.toggle('scale-125', i === currentSlide);
            });
        }

        function resetProgressBar() {
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            setTimeout(() => {
                progressBar.style.transition = 'width 10000ms linear';
                progressBar.style.width = '100%';
            }, 10);
        }

        function nextSlide() { showSlide(currentSlide + 1); }
        function prevSlide() { showSlide(currentSlide - 1); }

        function startAutoPlay() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(nextSlide, 10000);
            resetProgressBar();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const play = document.getElementById('play-icon');
            const pause = document.getElementById('pause-icon');
            if (isPlaying) {
                play.classList.add('hidden');
                pause.classList.remove('hidden');
                startAutoPlay();
            } else {
                play.classList.remove('hidden');
                pause.classList.add('hidden');
                clearInterval(slideInterval);
            }
        }

        // === CARTRIDGES ===
        function createCartridges() {
            const grid = document.getElementById('cartridges-grid');
            grid.innerHTML = '';
            cartridgesData.forEach(c => {
                const html = `
                    <a href="${c.link}" target="_blank" class="cartridge block">
                        <div class="crt bg-gradient-to-b from-gray-900 to-black border-8 border-emerald-400 rounded-3xl p-8 h-full flex flex-col items-center justify-center text-center">
                            <div class="text-8xl mb-6">📼</div>
                            <h3 class="text-4xl text-emerald-400 mb-1">${c.title}</h3>
                            <p class="text-xl opacity-75">${c.subtitle}</p>
                            <div class="mt-8 px-10 py-3 border-2 border-emerald-400 text-emerald-400 hover:bg-emerald-400 hover:text-black text-2xl rounded-2xl transition-colors">PRESS START</div>
                        </div>
                    </a>
                `;
                grid.innerHTML += html;
            });
        }

        // === LIVE LOG ===
        const logs = ["CONNECTING TO THE GRID...", "ENCRYPTING NEURAL PATHWAYS...", "LOADING CARTRIDGE DATA...", "SCANNING FOR GLITCHES..."];
        let logIndex = 0;
        function liveLog() {
            document.getElementById('live-log').textContent = logs[logIndex];
            logIndex = (logIndex + 1) % logs.length;
        }
        setInterval(liveLog, 2500);

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        // INIT
        window.onload = () => {
            createSlides();
            createCartridges();
            startAutoPlay();
            liveLog();
            console.log('%cNEON TERMINAL FULLY BOOTED — SINGLE FILE MODE', 'color:#00f7ff;font-size:22px;font-family:monospace');
        };
    </script>
</body>
</html>
