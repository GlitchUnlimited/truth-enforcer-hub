<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNAPSE://2077 — NEURAL GRID ONLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --neon-cyan: #00f7ff;
            --neon-pink: #ff00ff;
            --neon-purple: #9d00ff;
        }
        
        body {
            background: #05050f;
            color: #00f7ff;
            font-family: 'Press Start 2P', system-ui;
            overflow-x: hidden;
        }
        
        .neural-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0033 0%, #05050f 70%);
        }
        
        .scan {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent, rgba(157, 0, 255, 0.15) 50%, transparent);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }
        
        .glitch {
            animation: glitch-text 0.8s infinite alternate;
        }
        
        @keyframes glitch-text {
            0% { text-shadow: 3px 0 #ff00ff, -3px 0 #00f7ff; }
            100% { text-shadow: -3px 0 #ff00ff, 3px 0 #00f7ff; }
        }
        
        .hero-slider {
            position: relative;
            height: 520px;
            border: 8px solid #9d00ff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 0 80px #9d00ff,
                inset 0 0 60px rgba(157, 0, 255, 0.6);
        }
        
        .slides-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, #05050f);
            padding: 2rem;
            opacity: 0;
            transition: all 0.4s;
        }
        
        .slide:hover .overlay { opacity: 1; }
        
        .control {
            background: rgba(5, 5, 15, 0.9);
            border: 4px solid #00f7ff;
            color: #00f7ff;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 50%;
            box-shadow: 0 0 40px #00f7ff;
            transition: all 0.2s;
        }
        
        .control:hover {
            transform: scale(1.2);
            box-shadow: 0 0 60px #ff00ff;
        }
        
        .project-node {
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border: 4px solid #9d00ff;
        }
        
        .project-node:hover {
            transform: scale(1.1) rotate(4deg);
            box-shadow: 0 0 60px #ff00ff;
            border-color: #00f7ff;
        }
    </style>
</head>
<body class="min-h-screen pb-12 relative">
    <!-- NEURAL NETWORK BACKGROUND -->
    <canvas id="neural-canvas" class="neural-bg"></canvas>
    <div class="scan"></div>

    <div class="max-w-7xl mx-auto px-6 pt-12">
        
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="text-5xl glitch">SYNAPSE</div>
                <div class="text-2xl text-pink-400">://2077</div>
            </div>
            <div class="text-xs tracking-[4px] bg-black/50 px-6 py-3 border border-cyan-400 rounded-full flex items-center gap-3">
                <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>
                NEURAL LINK ESTABLISHED • LIVE
            </div>
            <div onclick="window.location.reload()" class="cursor-pointer text-pink-400 hover:text-cyan-400 transition-colors">REBOOT GRID</div>
        </div>

        <!-- THE SLIDER YOU ASKED FOR (now way cleaner + different) -->
        <div class="hero-slider mx-auto mb-16" id="slider-container">
            <div id="slides-wrapper" class="slides-wrapper"></div>
            
            <!-- Controls -->
            <div class="absolute bottom-8 left-8 right-8 flex items-center justify-between z-20 px-8">
                <button onclick="prevSlide()" class="control">◀</button>
                
                <button onclick="togglePlay()" id="play-btn" class="control text-4xl w-20 h-20">
                    <span id="play-icon">▶</span>
                    <span id="pause-icon" class="hidden">❚❚</span>
                </button>
                
                <button onclick="nextSlide()" class="control">▶</button>
            </div>
            
            <!-- Progress -->
            <div class="absolute bottom-0 left-0 right-0 h-2 bg-black/70 z-10">
                <div id="progress" class="h-full w-0 bg-gradient-to-r from-cyan-400 to-pink-400 transition-all duration-[10000ms] linear"></div>
            </div>
            
            <!-- Dots -->
            <div id="dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-4 z-20"></div>
        </div>

        <!-- FOUR PROJECT BOXES (now "NEURAL NODES") -->
        <div class="text-center mb-8">
            <div class="inline-block px-8 py-4 border border-pink-400 text-pink-400 text-xl tracking-widest bg-black/60 rounded-3xl">
                NEURAL NODES — CONNECT TO PROJECTS
            </div>
        </div>
        
        <div id="nodes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>

    <script>
        // === NEURAL NETWORK BACKGROUND ===
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = '#9d00ff';
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 140) {
                        ctx.strokeStyle = `rgba(157, 0, 255, ${1 - distance / 140})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateNeural() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            connectParticles();
            requestAnimationFrame(animateNeural);
        }

        // Initialize particles
        function initParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }

        // === SLIDER (10 second cycle, arrows, play/pause, progress) ===
        const slidesData = [
            { img: "https://via.placeholder.com/1920x1080/1a0033/00f7ff?text=REPLACE+WITH+YOUR+IMAGE+1", title: "PROJECT ONE", link: "#" },
            { img: "https://via.placeholder.com/1920x1080/1a0033/ff00ff?text=REPLACE+WITH+YOUR+IMAGE+2", title: "PROJECT TWO", link: "#" },
            { img: "https://via.placeholder.com/1920x1080/1a0033/9d00ff?text=REPLACE+WITH+YOUR+IMAGE+3", title: "PROJECT THREE", link: "#" },
            { img: "https://via.placeholder.com/1920x1080/1a0033/00ff41?text=REPLACE+WITH+YOUR+IMAGE+4", title: "PROJECT FOUR", link: "#" }
        ];

        let current = 0;
        let playing = true;
        let interval;

        const wrapper = document.getElementById('slides-wrapper');
        const progressEl = document.getElementById('progress');
        const dotsEl = document.getElementById('dots');

        function createSlider() {
            wrapper.innerHTML = '';
            slidesData.forEach(slide => {
                const slideHTML = `
                    <a href="${slide.link}" target="_blank" class="slide block relative">
                        <img src="${slide.img}" alt="${slide.title}" class="w-full h-full object-cover">
                        <div class="overlay text-white">
                            <h2 class="text-5xl mb-2">${slide.title}</h2>
                            <p class="text-xl text-cyan-300">CLICK TO ENTER THE GRID</p>
                        </div>
                    </a>
                `;
                wrapper.innerHTML += slideHTML;
            });
            
            // Dots
            dotsEl.innerHTML = slidesData.map((_, i) => `
                <button onclick="goToSlide(${i})" class="w-4 h-4 rounded-full border-2 border-cyan-400 ${i === 0 ? 'bg-cyan-400' : ''}"></button>
            `).join('');
        }

        function goToSlide(n) {
            current = n;
            wrapper.style.transform = `translateX(-${current * 100}%)`;
            updateDots();
            resetProgress();
        }

        function updateDots() {
            const dots = dotsEl.children;
            for (let i = 0; i < dots.length; i++) {
                dots[i].classList.toggle('bg-cyan-400', i === current);
            }
        }

        function nextSlide() {
            current = (current + 1) % slidesData.length;
            wrapper.style.transform = `translateX(-${current * 100}%)`;
            updateDots();
            resetProgress();
        }

        function prevSlide() {
            current = (current - 1 + slidesData.length) % slidesData.length;
            wrapper.style.transform = `translateX(-${current * 100}%)`;
            updateDots();
            resetProgress();
        }

        function resetProgress() {
            progressEl.style.transition = 'none';
            progressEl.style.width = '0%';
            setTimeout(() => {
                progressEl.style.transition = 'width 10000ms linear';
                progressEl.style.width = '100%';
            }, 20);
        }

        function startSlider() {
            if (interval) clearInterval(interval);
            interval = setInterval(nextSlide, 10000);
            resetProgress();
        }

        function togglePlay() {
            playing = !playing;
            const play = document.getElementById('play-icon');
            const pause = document.getElementById('pause-icon');
            if (playing) {
                play.classList.add('hidden');
                pause.classList.remove('hidden');
                startSlider();
            } else {
                play.classList.remove('hidden');
                pause.classList.add('hidden');
                clearInterval(interval);
            }
        }

        // === FOUR NEURAL NODES ===
        const nodeData = [
            { title: "NODE 01", desc: "NEON RUNNER", link: "#", color: "#00f7ff" },
            { title: "NODE 02", desc: "GLITCH CORE", link: "#", color: "#ff00ff" },
            { title: "NODE 03", desc: "VOID ARCHIVE", link: "#", color: "#9d00ff" },
            { title: "NODE 04", desc: "HYPERDRIVE", link: "#", color: "#00ff41" }
        ];

        function createNodes() {
            const grid = document.getElementById('nodes-grid');
            grid.innerHTML = nodeData.map(node => `
                <a href="${node.link}" target="_blank" class="project-node bg-[#0a0a1f] p-8 rounded-3xl text-center group">
                    <div class="text-7xl mb-6 transition-all group-hover:scale-110" style="color: ${node.color};">◉</div>
                    <div class="text-3xl mb-2 text-white">${node.title}</div>
                    <div class="text-xl text-pink-300">${node.desc}</div>
                    <div class="mt-8 text-xs tracking-widest border border-current text-current px-6 py-3 inline-block rounded-2xl group-hover:bg-current group-hover:text-[#05050f]">CONNECT →</div>
                </a>
            `).join('');
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === ' ') {
                e.preventDefault();
                togglePlay();
            }
        });

        // BOOT THE WHOLE THING
        window.onload = () => {
            initParticles();
            animateNeural();
            createSlider();
            createNodes();
            startSlider();
            
            console.log('%cSYNAPSE://2077 FULLY CONNECTED — NEW GRID DROPPED', 'color:#ff00ff; font-size:18px; font-family:monospace');
            console.log('Replace the placeholder images in the slidesData array with your own URLs');
        };
    </script>
</body>
</html>
