<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD2 Hub • Super Earth Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      font-family: system-ui, sans-serif;
    }
    .nav-card {
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: #111111;
      border: 2px solid #3f3f46;
    }
    .nav-card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: #00bfff;
      box-shadow: 0 25px 50px -12px rgb(0 191 255 / 0.5);
    }
    .card-image {
      position: relative;
      height: 180px;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }
    .card-image::after {
      content: '';
      position: absolute;
      top: -100%;
      left: -100%;
      width: 50%;
      height: 300%;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.45) 50%, transparent 70%);
      transform: skewX(-25deg);
      transition: all 0.7s ease;
      opacity: 0;
    }
    .nav-card:hover .card-image::after {
      top: -50%;
      left: -50%;
      opacity: 1;
    }
    .sky-blue { color: #00bfff; }
    .glow-blue { text-shadow: 0 0 25px rgb(0 191 255); }
    .blue-banner {
      background: linear-gradient(90deg, #0a2540, #003366);
      border: 2px solid #00bfff;
      border-radius: 16px;
      padding: 28px 40px;
      margin-bottom: 50px;
      text-align: center;
    }
    .mo-box {
      background: linear-gradient(135deg, #1a2533, #0f172a);
      border: 2px solid #00bfff;
    }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-8">

    <!-- Blue Banner -->
    <div class="blue-banner">
      <div class="flex items-center justify-center gap-4 text-4xl font-black">
        <i class="fas fa-skull-crossbones sky-blue"></i>
        <span class="glow-blue">HD2 HUB</span>
      </div>
      <p class="text-sky-300 mt-3 text-xl">
        Super Earth Intelligence Division • Real-time Helldivers 2 Tracker
      </p>
    </div>

    <!-- Major Order Briefing -->
    <div class="mo-box rounded-3xl p-8 mb-12">
      <div class="flex items-center gap-3 mb-5">
        <i class="fas fa-scroll text-3xl sky-blue"></i>
        <h2 class="text-3xl font-bold">Major Order Briefing</h2>
      </div>
      <div id="briefing-text" class="text-gray-200 text-lg leading-relaxed min-h-[140px] whitespace-pre-wrap">
        Contacting Super Earth High Command...
      </div>
      <div id="last-updated" class="text-xs text-gray-500 mt-4"></div>
    </div>

    <!-- Your 6 navigation boxes stay exactly the same -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Known Issues, Patch Notes, Undocumented Changes, Community Reports, Recent Videos, Resources -->
      <!-- (paste your existing 6 cards here - they are unchanged) -->
    </div>

    <footer class="mt-24 text-center text-gray-500 text-sm">
      <p>Fan-made HD2 Hub • Not affiliated with Arrowhead Game Studios or PlayStation</p>
    </footer>
  </div>

  <script>
    async function fetchMajorOrderBriefing() {
      const briefingEl = document.getElementById('briefing-text');
      const lastUpdatedEl = document.getElementById('last-updated');

      briefingEl.textContent = "Contacting Super Earth High Command...";

      try {
        const res = await fetch('https://helldiverstrainingmanual.com/api/v1/war/major-orders', { cache: 'no-store' });
        const data = await res.json();

        if (data && data.length > 0) {
          const mo = data[0];
          
          // Try all possible fields that might contain the briefing text
          let briefing = mo.briefing || 
                        mo.description || 
                        mo.title || 
                        (mo.tasks && mo.tasks[0] && mo.tasks[0].description) ||
                        "Major Order is active.";

          briefingEl.textContent = briefing;
          lastUpdatedEl.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        } else {
          briefingEl.textContent = "No active Major Order at this time.";
        }
      } catch (err) {
        console.error(err);
        briefingEl.textContent = "Unable to load Major Order briefing right now.\nThe page will keep trying automatically.";
      }
    }

    fetchMajorOrderBriefing();
    setInterval(fetchMajorOrderBriefing, 45000);  // Refresh every 45 seconds
  </script>
</body>
</html>
