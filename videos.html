<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recent Videos • HD2 Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      font-family: system-ui, sans-serif;
    }
    .sky-blue { color: #00bfff; }

    .featured-box {
      background: #111111;
      border: 2px solid #3f3f46;
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 7fr 5fr;   /* Thumbnail slightly larger */
      gap: 0;
      transition: all 0.4s ease;
    }

    .featured-box:hover {
      border-color: #00bfff;
      box-shadow: 0 30px 60px -15px rgb(0 191 255 / 0.5);
    }

    .thumbnail-side {
      position: relative;
      background: #000;
    }

    .thumbnail-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .featured-box:hover .thumbnail-side img {
      transform: scale(1.05);
    }

    .blue-accent {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 10px;
      background: linear-gradient(to bottom, #00bfff, #0077cc);
    }

    .info-side {
      padding: 45px 50px;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body class="text-white min-h-screen pb-20">
  <div class="max-w-7xl mx-auto p-8">

    <a href="index.html" class="inline-flex items-center gap-3 text-sky-400 hover:text-sky-300 mb-10">
      ← Back to HD2 Hub
    </a>

    <h1 class="text-5xl font-bold flex items-center gap-4 mb-12">
      <i class="fas fa-video sky-blue"></i>
      Recent Videos
    </h1>

    <!-- Featured Newest Video -->
    <div id="featured-box" class="featured-box mb-20">
      <!-- Left: Thumbnail with blue bar -->
      <div class="thumbnail-side relative">
        <div class="blue-accent"></div>
        <img id="featured-thumbnail" src="" alt="Latest Video">
      </div>

      <!-- Right: Info + Real Video Description -->
      <div class="info-side">
        <div class="flex items-center gap-4 mb-6">
          <span class="px-6 py-2 bg-red-600 text-white text-sm font-bold rounded-2xl">NEWEST UPLOAD</span>
          <span id="featured-date" class="text-gray-400 text-sm"></span>
        </div>

        <h2 id="featured-title" class="text-3xl font-bold leading-tight mb-6"></h2>

        <!-- Actual description from the video -->
        <div id="featured-desc" class="text-gray-300 text-[15.5px] leading-relaxed mb-10 flex-1 overflow-auto max-h-52"></div>

        <button id="watch-btn"
                onclick="window.open('#', '_blank')"
                class="mt-auto w-full bg-sky-600 hover:bg-sky-500 transition-colors py-5 rounded-2xl font-semibold text-lg flex items-center justify-center gap-3">
          <i class="fas fa-play"></i>
          Watch Video Now
        </button>
      </div>
    </div>

    <!-- More Videos Grid -->
    <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3">
      <i class="fas fa-list-ul"></i>
      More Recent Videos
    </h2>

    <div id="video-grid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <!-- Other videos go here -->
    </div>

    <div class="mt-20 text-center">
      <a href="https://www.youtube.com/@GlitchUnlimited" 
         target="_blank"
         class="inline-flex items-center gap-3 bg-red-600 hover:bg-red-700 px-10 py-5 rounded-2xl font-semibold text-lg transition-colors">
        <i class="fab fa-youtube text-2xl"></i>
        Watch All Videos on YouTube
      </a>
    </div>
  </div>

  <script>
    async function loadYouTubeVideos() {
      try {
        const channelID = "UCcnkqkNWjiwLcDUx0WshOmg";
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`;
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        const response = await fetch(apiUrl);
        const data = await response.json();

        if (!data.items || data.items.length === 0) return;

        const videos = data.items;
        const newest = videos[0];
        const videoId = newest.link.split('v=')[1] || newest.link.split('/').pop();

        // Featured Video - Thumbnail
        document.getElementById('featured-thumbnail').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

        // Title and Date
        document.getElementById('featured-title').textContent = newest.title;
        document.getElementById('featured-date').textContent = 
          new Date(newest.pubDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

        // Real Video Description (from RSS)
        let desc = newest.description || "No description available for this video.";
        // Clean up common HTML tags from RSS
        desc = desc.replace(/<[^>]+>/g, ' ').trim();
        document.getElementById('featured-desc').textContent = desc;

        // Watch button
        document.getElementById('watch-btn').onclick = () => window.open(newest.link, '_blank');

        // More Videos Grid
        const grid = document.getElementById('video-grid');
        grid.innerHTML = '';

        videos.slice(1).forEach(video => {
          const vidId = video.link.split('v=')[1] || video.link.split('/').pop();

          const card = document.createElement('div');
          card.className = `video-card rounded-3xl overflow-hidden cursor-pointer border border-zinc-700 hover:border-sky-400`;
          card.innerHTML = `
            <div class="relative">
              <img src="https://img.youtube.com/vi/${vidId}/hqdefault.jpg" 
                   class="w-full aspect-video object-cover" alt="${video.title}">
              <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
            </div>
            <div class="p-6">
              <h3 class="font-semibold text-base leading-tight line-clamp-2 mb-3">${video.title}</h3>
              <p class="text-xs text-gray-500">${new Date(video.pubDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</p>
            </div>
          `;
          card.addEventListener('click', () => window.open(video.link, '_blank'));
          grid.appendChild(card);
        });

      } catch (error) {
        console.error("Failed to load videos:", error);
      }
    }

    // Run when page loads
    loadYouTubeVideos();
  </script>
</body>
</html>
